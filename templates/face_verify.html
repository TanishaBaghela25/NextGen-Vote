<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Face Verification — NEXTGEN VOTE</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body { overflow: hidden; }

.fv-wrap {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 1rem 1rem;
}

.fv-title {
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--accent-blue);
  letter-spacing: 3px;
  text-align: center;
  margin-bottom: 0.5rem;
  animation: glow-text 2s ease-in-out infinite alternate;
}

.fv-subtitle {
  color: var(--text-secondary);
  font-size: 0.9rem;
  text-align: center;
  margin-bottom: 2rem;
}

.cam-wrapper {
  position: relative;
  display: inline-block;
  border-radius: var(--radius-xl);
  overflow: hidden;
}

.cam-border {
  position: absolute; inset: 0;
  border: 3px solid rgba(0,212,255,0.4);
  border-radius: var(--radius-xl);
  box-shadow:
    inset 0 0 30px rgba(0,212,255,0.08),
    0 0 40px rgba(0,212,255,0.15);
  pointer-events: none;
  z-index: 2;
  animation: pulse-glow 2s ease-in-out infinite;
}

/* Corner brackets */
.cam-corner {
  position: absolute;
  width: 30px; height: 30px;
  z-index: 3;
  pointer-events: none;
}

.cam-corner::before,
.cam-corner::after {
  content: '';
  position: absolute;
  background: var(--accent-cyan);
}

.cam-corner::before { width: 3px; height: 100%; }
.cam-corner::after  { width: 100%; height: 3px; }

.cam-corner.tl { top: 8px; left: 8px; }
.cam-corner.tr { top: 8px; right: 8px; transform: scaleX(-1); }
.cam-corner.bl { bottom: 8px; left: 8px; transform: scaleY(-1); }
.cam-corner.br { bottom: 8px; right: 8px; transform: scale(-1); }

#face-video {
  width: 500px;
  height: 375px;
  object-fit: cover;
  display: block;
}

.scan-line-fv {
  position: absolute;
  left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-blue), var(--accent-cyan), transparent);
  z-index: 4;
  animation: scanline 2s linear infinite;
  box-shadow: 0 0 12px rgba(0,212,255,0.8);
}

.status-panel {
  margin-top: 1.5rem;
  padding: 14px 32px;
  border-radius: 50px;
  font-size: 1rem;
  font-weight: 600;
  background: rgba(0,212,255,0.08);
  border: 1px solid rgba(0,212,255,0.2);
  color: var(--accent-blue);
  text-align: center;
  min-width: 300px;
  transition: var(--transition);
}

.loader-ring {
  width: 50px; height: 50px;
  border: 4px solid rgba(0,212,255,0.15);
  border-top-color: var(--accent-blue);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 1rem auto;
}

.attempts-bar {
  display: flex; gap: 6px;
  justify-content: center;
  margin-top: 1rem;
}

.attempt-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--glass-border);
  transition: var(--transition);
}

.attempt-dot.fail  { background: var(--accent-red); }
.attempt-dot.pass  { background: var(--accent-green); }
.attempt-dot.check { background: var(--accent-blue); animation: pulse-glow 0.8s ease-in-out infinite; }
</style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon">
  <div class="face-logo">
    <span class="ring ring-1"></span>
    <span class="ring ring-2"></span>
    <span class="ring ring-3"></span>
    <span class="logo-scan"></span>
    <span class="face-icon"><i class="fa fa-user"></i></span>
  </div>
</div>
    <span class="nav-logo-text">NEXTGEN VOTE</span>
  </a>
</nav>

<div class="fv-wrap">
  <div class="fv-title">AI FACE VERIFICATION</div>
  <div class="fv-subtitle">Hold still — system is matching your face to voter records</div>

  <div class="cam-wrapper">
    <div class="cam-border"></div>
    <div class="cam-corner tl"></div>
    <div class="cam-corner tr"></div>
    <div class="cam-corner bl"></div>
    <div class="cam-corner br"></div>
    <div class="scan-line-fv"></div>
    <video id="face-video" autoplay playsinline></video>
  </div>

  <div class="loader-ring" id="loader"></div>

  <div class="status-panel" id="status-panel">
    🔍 Initializing Camera...
  </div>

  <div class="attempts-bar" id="attempts">
    <div class="attempt-dot" id="a1"></div>
    <div class="attempt-dot" id="a2"></div>
    <div class="attempt-dot" id="a3"></div>
    <div class="attempt-dot" id="a4"></div>
    <div class="attempt-dot" id="a5"></div>
  </div>

  <p style="color:var(--text-muted);font-size:0.8rem;margin-top:1rem;text-align:center;">
    Ensure good lighting • Face the camera directly • Remove glasses if needed
  </p>
</div>

<script>
const video = document.getElementById('face-video');
const statusPanel = document.getElementById('status-panel');
const loader = document.getElementById('loader');
let verified = false;
let attemptCount = 0;
let faceInterval;

navigator.mediaDevices.getUserMedia({ video: { width:500, height:375 } })
  .then(stream => {
    video.srcObject = stream;
    statusPanel.textContent = '🔍 Scanning Face...';
    setTimeout(() => {
      faceInterval = setInterval(verifyFace, 2500);
    }, 1500);
  })
  .catch(e => {
    statusPanel.textContent = '❌ Camera access denied';
    statusPanel.style.color = 'var(--accent-red)';
    loader.style.display = 'none';
  });

function setAttempt(n, state) {
  const dot = document.getElementById('a' + n);
  if(dot) dot.className = 'attempt-dot ' + state;
}

function verifyFace() {
  if(verified) return;

  attemptCount++;
  if(attemptCount <= 5) setAttempt(attemptCount, 'check');

  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const image = canvas.toDataURL('image/jpeg', 0.6);

  fetch('/face_verify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ image })
  })
  .then(r => r.json())
  .then(data => {
    console.log('Face verify:', data);
    if(data.status === 'success') {
      verified = true;
      clearInterval(faceInterval);
      if(attemptCount <= 5) setAttempt(attemptCount, 'pass');
      loader.style.display = 'none';
      document.querySelector('.cam-border').style.borderColor = 'rgba(0,255,136,0.6)';
      document.querySelector('.cam-border').style.boxShadow = '0 0 40px rgba(0,255,136,0.3), inset 0 0 30px rgba(0,255,136,0.1)';
      document.querySelectorAll('.cam-corner::before, .cam-corner::after').forEach(el => el.style.background = 'var(--accent-green)');
      statusPanel.style.background = 'rgba(0,255,136,0.1)';
      statusPanel.style.borderColor = 'rgba(0,255,136,0.3)';
      statusPanel.style.color = 'var(--accent-green)';
      statusPanel.innerHTML = '✅ Identity Verified — Redirecting to Vote Page...';
      setTimeout(() => window.location.href = '/vote', 2000);
    } else {
      if(attemptCount <= 5) setAttempt(attemptCount, 'fail');
      statusPanel.style.borderColor = 'rgba(255,51,102,0.3)';
      statusPanel.style.color = 'var(--accent-red)';
      statusPanel.innerHTML = '❌ ' + (data.message || 'Face not matched');
      setTimeout(() => {
        statusPanel.style.borderColor = 'rgba(0,212,255,0.2)';
        statusPanel.style.color = 'var(--accent-blue)';
        statusPanel.textContent = '🔍 Scanning...';
      }, 1500);
    }
  })
  .catch(() => {
    statusPanel.innerHTML = '⚠️ Server error — retrying...';
    statusPanel.style.color = 'var(--accent-orange)';
  });
}
</script>
</body>
</html>
