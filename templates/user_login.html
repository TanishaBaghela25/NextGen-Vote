<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Voter Login — NEXTGEN VOTE</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 100px 1rem 2rem;
}

.login-card {
  width: 100%;
  max-width: 460px;
  padding: 2.5rem;
  border-radius: var(--radius-xl);
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  box-shadow: var(--shadow-card);
}

.login-icon {
  width: 64px; height: 64px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(124,58,237,0.2));
  border: 1px solid rgba(0,212,255,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem;
  margin: 0 auto 1.5rem;
}
</style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon">
  <div class="face-logo">
    <span class="ring ring-1"></span>
    <span class="ring ring-2"></span>
    <span class="ring ring-3"></span>
    <span class="logo-scan"></span>
    <span class="face-icon"><i class="fa fa-user"></i></span>
  </div>
</div>
    <span class="nav-logo-text">NEXTGEN VOTE</span>
  </a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/register">Register</a></li>
  </ul>
</nav>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-icon">🗳️</div>
    <div style="text-align:center;margin-bottom:2rem;">
      <h2 style="font-family:var(--font-display);font-size:1.3rem;color:var(--text-primary);margin-bottom:0.4rem;">VOTER LOGIN</h2>
      <p style="color:var(--text-muted);font-size:0.85rem;">Enter your Aadhaar & EPIC ID to proceed</p>
    </div>

    {% if error %}
    <div class="alert alert-error">
      <i class="fa fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Aadhaar Number</label>
        <div class="form-input-icon">
          <span class="icon"><i class="fa fa-id-badge"></i></span>
          <input type="text" name="aadhaar" class="form-input"
                 placeholder="12-digit Aadhaar" maxlength="12"
                 pattern="[0-9]{12}" title="Enter 12-digit Aadhaar" required
                 autocomplete="off">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">EPIC / Voter ID</label>
        <div class="form-input-icon">
          <span class="icon"><i class="fa fa-id-card"></i></span>
          <input type="text" name="epic_id" class="form-input"
                 placeholder="e.g. ABC1234567" maxlength="10"
                 required autocomplete="off">
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:0.5rem;">
        <i class="fa fa-paper-plane"></i> Send OTP
      </button>
    </form>

    <div class="glow-line"></div>
    <p style="text-align:center;color:var(--text-muted);font-size:0.85rem;">
      Not registered? <a href="/register" style="color:var(--accent-blue);text-decoration:none;">Register here</a>
    </p>
  </div>
</div>
</body>
</html>
