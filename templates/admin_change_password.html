<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Change Password — NEXTGEN VOTE Admin</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
.admin-layout { display: flex; min-height: 100vh; padding-top: 70px; }
.sidebar {
  width: 240px; min-width: 240px;
  background: rgba(4,10,26,0.95);
  border-right: 1px solid var(--glass-border);
  padding: 1.5rem 0;
  position: fixed; top: 70px; bottom: 0; overflow-y: auto;
}
.sidebar-section {
  padding: 0.5rem 1rem;
  font-size: 0.7rem; font-weight: 600;
  color: var(--text-muted); letter-spacing: 2px;
  text-transform: uppercase; margin-top: 1rem;
}
.sidebar-link {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; color: var(--text-secondary);
  text-decoration: none; font-size: 0.9rem;
  transition: var(--transition); border-left: 3px solid transparent;
}
.sidebar-link:hover, .sidebar-link.active {
  color: var(--text-primary); background: rgba(0,212,255,0.05);
  border-left-color: var(--accent-blue);
}
.sidebar-link i { width: 18px; text-align: center; }
.admin-main { flex: 1; margin-left: 240px; padding: 2rem; display: flex; align-items: flex-start; justify-content: center; }
.settings-card {
  width: 100%; max-width: 480px;
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-xl);
  padding: 2.5rem;
  margin-top: 1rem;
}
.pw-strength {
  height: 4px;
  border-radius: 10px;
  background: rgba(255,255,255,0.06);
  margin-top: 6px;
  overflow: hidden;
}
.pw-fill {
  height: 100%;
  border-radius: 10px;
  transition: all 0.3s;
  width: 0%;
}
@media(max-width:768px) {
  .sidebar { display: none; }
  .admin-main { margin-left: 0; }
}
</style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon">
  <div class="face-logo">
    <span class="ring ring-1"></span>
    <span class="ring ring-2"></span>
    <span class="ring ring-3"></span>
    <span class="logo-scan"></span>
    <span class="face-icon"><i class="fa fa-user"></i></span>
  </div>
</div>
    <span class="nav-logo-text">NEXTGEN VOTE</span>
  </a>
  <ul class="nav-links">
    <li><a href="/admin_dashboard">Dashboard</a></li>
    <li><a href="/admin_logout">Logout</a></li>
  </ul>
</nav>

<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-section">Main</div>
    <a href="/admin_dashboard" class="sidebar-link"><i class="fa fa-chart-pie"></i> Dashboard</a>
    <a href="/admin_voters" class="sidebar-link"><i class="fa fa-users"></i> Voters</a>
    <a href="/admin_results" class="sidebar-link"><i class="fa fa-chart-bar"></i> Live Results</a>
    <div class="sidebar-section">Admin</div>
    <a href="/admin_change_password" class="sidebar-link active"><i class="fa fa-key"></i> Change Password</a>
    <a href="/admin_add" class="sidebar-link"><i class="fa fa-user-plus"></i> Add Admin</a>
    <a href="/admin_logout" class="sidebar-link"><i class="fa fa-sign-out-alt"></i> Logout</a>
  </aside>

  <main class="admin-main">
    <div class="settings-card">
      <div style="margin-bottom:2rem;">
        <div style="font-family:var(--font-display);font-size:1.2rem;font-weight:700;margin-bottom:0.3rem;">
          <i class="fa fa-key" style="color:var(--accent-blue);margin-right:8px;"></i>Change Admin Credentials
        </div>
        <div style="color:var(--text-muted);font-size:0.85rem;">
          Update your username and password. Changes take effect immediately.
        </div>
      </div>

      {% if error %}
      <div class="alert alert-error"><i class="fa fa-exclamation-circle"></i> {{ error }}</div>
      {% endif %}
      {% if success %}
      <div class="alert alert-success"><i class="fa fa-check-circle"></i> {{ success }}</div>
      {% endif %}

      <form method="POST">
        <div class="form-group">
          <label class="form-label">Current Password *</label>
          <div class="form-input-icon" style="position:relative;">
            <span class="icon"><i class="fa fa-lock"></i></span>
            <input type="password" name="old_password" id="old-pw" class="form-input" placeholder="Enter current password" required>
            <span onclick="toggleField('old-pw','eye1')" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text-muted);">
              <i id="eye1" class="fa fa-eye"></i>
            </span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">New Username *</label>
          <div class="form-input-icon">
            <span class="icon"><i class="fa fa-user"></i></span>
            <input type="text" name="new_username" class="form-input" placeholder="New admin username" required minlength="4">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">New Password *</label>
          <div class="form-input-icon" style="position:relative;">
            <span class="icon"><i class="fa fa-lock"></i></span>
            <input type="password" name="new_password" id="new-pw" class="form-input" placeholder="Min 8 chars, 1 uppercase, 1 number" required minlength="8" oninput="checkStrength(this.value)">
            <span onclick="toggleField('new-pw','eye2')" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text-muted);">
              <i id="eye2" class="fa fa-eye"></i>
            </span>
          </div>
          <div class="pw-strength"><div class="pw-fill" id="pw-fill"></div></div>
          <div id="pw-label" style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm New Password *</label>
          <div class="form-input-icon">
            <span class="icon"><i class="fa fa-check-circle"></i></span>
            <input type="password" name="confirm_password" id="confirm-pw" class="form-input" placeholder="Re-enter new password" required oninput="checkMatch()">
          </div>
          <div id="match-label" style="font-size:0.75rem;margin-top:4px;"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:0.5rem;">
          <i class="fa fa-save"></i> Update Credentials
        </button>
      </form>
    </div>
  </main>
</div>

<script>
function toggleField(id, eyeId) {
  const f = document.getElementById(id);
  const e = document.getElementById(eyeId);
  f.type = f.type === 'password' ? 'text' : 'password';
  e.className = f.type === 'password' ? 'fa fa-eye' : 'fa fa-eye-slash';
}

function checkStrength(val) {
  const fill = document.getElementById('pw-fill');
  const label = document.getElementById('pw-label');
  let score = 0;
  if(val.length >= 8) score++;
  if(/[A-Z]/.test(val)) score++;
  if(/[0-9]/.test(val)) score++;
  if(/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    { w:'0%',  c:'transparent',        t:'' },
    { w:'25%', c:'var(--accent-red)',   t:'Weak' },
    { w:'50%', c:'var(--accent-orange)',t:'Fair' },
    { w:'75%', c:'var(--accent-blue)',  t:'Good' },
    { w:'100%',c:'var(--accent-green)', t:'Strong' }
  ];
  const l = levels[score];
  fill.style.width = l.w;
  fill.style.background = l.c;
  label.textContent = l.t;
  label.style.color = l.c;
}

function checkMatch() {
  const np = document.getElementById('new-pw').value;
  const cp = document.getElementById('confirm-pw').value;
  const lbl = document.getElementById('match-label');
  if(!cp) { lbl.textContent = ''; return; }
  if(np === cp) {
    lbl.textContent = '✓ Passwords match';
    lbl.style.color = 'var(--accent-green)';
  } else {
    lbl.textContent = '✗ Passwords do not match';
    lbl.style.color = 'var(--accent-red)';
  }
}
</script>
</body>
</html>
