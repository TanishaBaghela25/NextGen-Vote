<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vote Submitted — NEXTGEN VOTE</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
.success-wrap {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 2rem;
}

.success-card {
  text-align: center;
  max-width: 500px;
  padding: 3.5rem;
  border-radius: var(--radius-xl);
  background: var(--bg-card);
  border: 1px solid rgba(0,255,136,0.2);
  box-shadow: 0 0 60px rgba(0,255,136,0.07);
}

.check-circle {
  width: 100px; height: 100px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,255,136,0.2), rgba(0,255,136,0.05));
  border: 3px solid rgba(0,255,136,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem;
  margin: 0 auto 2rem;
  animation: pulse-glow 2s ease-in-out infinite, float 3s ease-in-out infinite;
  box-shadow: 0 0 40px rgba(0,255,136,0.2);
}

h1 {
  font-family: var(--font-display);
  font-size: 1.5rem;
  color: var(--accent-green);
  margin-bottom: 0.5rem;
}

.vote-receipt {
  background: rgba(0,255,136,0.05);
  border: 1px solid rgba(0,255,136,0.15);
  border-radius: var(--radius-md);
  padding: 1.2rem;
  margin: 1.5rem 0;
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.8;
}
</style>
</head>
<body>
<div class="success-wrap">
  <div class="success-card">
    <div class="check-circle">✅</div>
    <h1>VOTE SUBMITTED!</h1>
    <p style="color:var(--text-secondary);margin-bottom:1.5rem;">
      Thank you, <strong style="color:var(--text-primary);">{{ voter_name }}</strong>.<br>
      Your vote has been securely recorded.
    </p>
    <div class="vote-receipt">
      <div>🗳️ Party voted: <strong style="color:var(--text-primary);">{{ party }}</strong></div>
      <div style="margin-top:6px;">🔒 Your vote is anonymous and secure</div>
      <div style="margin-top:6px;">📋 Duplicate voting blocked for this Aadhaar</div>
    </div>
    <p style="color:var(--text-muted);font-size:0.8rem;margin-bottom:1.5rem;">
      Jai Hind 🇮🇳 — Every vote shapes the future of India
    </p>
    <a href="/" style="display:inline-flex;align-items:center;gap:8px;color:var(--accent-blue);text-decoration:none;font-size:0.9rem;">
      ← Return to Home
    </a>
  </div>
</div>
</body>
</html>
